{% extends 'base.html' %}

{% block title %}Chi Tiết Đơn Đặt Hàng - ALEX Paint System{% endblock %}

{% block content %}
<style>
    .phieu-view-container {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
        background-color: transparent; /* Đã đổi thành trong suốt */
        display: flex;
        justify-content: center;
        padding: 20px;
        min-height: calc(100vh - 60px);
    }

    .phieu-modal {
        background: #ffffff;
        width: 820px;
        border: 1px solid #777;
        position: relative;
        padding-bottom: 50px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .phieu-header {
        text-align: center;
        padding: 22px 0 18px 0;
    }
    .phieu-header h2 {
        font-size: 17px;
        font-weight: 700;
        color: #000;
        margin: 0;
    }
    .btn-close-phieu {
        position: absolute;
        top: 15px; right: 20px;
        font-size: 20px;
        font-weight: bold;
        color: #000;
        cursor: pointer;
        background: none;
        border: none;
        text-decoration: none;
    }

    .info-box {
        background-color: #e8e8e8;
        border: 1px solid #777;
        margin: 0 20px 15px 20px;
        padding: 16px 20px 24px 20px;
    }
    .info-box h3 {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 16px;
        margin-top: 0;
    }

    .info-grid {
        display: flex;
        justify-content: space-between;
        gap: 40px;
    }
    .info-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .form-group-phieu {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }
    .form-group-phieu label {
        font-size: 12px;
        margin-top: 5px;
        color: #000;
    }

    .input-box-phieu {
        width: 220px;
        height: 26px;
        border: 1px solid #5a5eb9;
        outline: none;
        font-size: 13px;
        padding: 0 6px;
        color: #000;
        background-color: #cecece; /* Chỉ xem */
        pointer-events: none;
    }

    textarea.input-box-phieu {
        height: 50px;
        resize: none;
        padding: 6px;
    }

    .phieu-data-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 45px;
    }
    .phieu-data-table th {
        background-color: #eeeeee;
        font-size: 12px;
        font-weight: 700;
        padding: 12px 5px;
        text-align: center;
        border: none;
    }
    .phieu-data-table td {
        padding: 18px 5px;
        text-align: center;
    }

    .line-input-phieu {
        border: none;
        border-bottom: 1px solid #000;
        width: 100%;
        background: transparent;
        outline: none;
        height: 20px;
        text-align: center;
        font-size: 13px;
        pointer-events: none; /* Chỉ xem */
    }

    .total-wrapper-phieu {
        display: flex;
        justify-content: flex-end;
        padding: 0 35px;
    }
    .total-box-phieu {
        background-color: #e8e8e8;
        border-radius: 15px;
        width: 320px;
        display: flex;
        justify-content: space-between;
        padding: 8px 25px;
        font-weight: 700;
        font-size: 15px;
    }
</style>

<div class="phieu-view-container">
    <div class="phieu-modal">
        <a href="{% url 'ds_don_dat_hang_ncc' %}" class="btn-close-phieu">X</a>

        <div class="phieu-header">
            <h2>CHI TIẾT ĐƠN ĐẶT HÀNG</h2>
        </div>

        <div class="info-box">
            <h3>Thông tin chung</h3>
            <div class="info-grid">
                <div class="info-col">
                    <div class="form-group-phieu">
                        <label>Nhà cung cấp</label>
                        <input type="text" class="input-box-phieu" value="Nhà cung cấp A">
                    </div>
                    <div class="form-group-phieu">
                        <label>Số điện thoại</label>
                        <input type="text" class="input-box-phieu" value="090506788">
                    </div>
                </div>
                <div class="info-col">
                    <div class="form-group-phieu">
                        <label>Mã phiếu</label>
                        <input type="text" class="input-box-phieu" value="XXXXXX">
                    </div>
                    <div class="form-group-phieu">
                        <label>Địa chỉ</label>
                        <textarea class="input-box-phieu">446 minh khai p Vĩnh Tuy, Q2, tpho Hồ Chí Minh</textarea>
                    </div>
                </div>
            </div>
        </div>

        <table class="phieu-data-table">
            <thead>
                <tr>
                    <th style="width: 60px;">STT</th>
                    <th style="width: 170px;">Tên hàng hóa</th>
                    <th style="width: 110px;">Mã hàng</th>
                    <th style="width: 90px;">Đơn vị<br>tính</th>
                    <th style="width: 110px;">Đơn giá</th>
                    <th style="width: 90px;">Số lượng</th>
                    <th style="width: 130px;">Thành tiền</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="text" class="line-input-phieu" style="width: 35px;" value="1"></td>
                    <td><input type="text" class="line-input-phieu" value="Sơn Alex - màu ABC"></td>
                    <td><input type="text" class="line-input-phieu" style="width: 75px;" value="XXXXXX"></td>
                    <td><input type="text" class="line-input-phieu" style="width: 50px;" value="thùng"></td>
                    <td><input type="text" class="line-input-phieu" style="width: 85px;" value="4.000.000"></td>
                    <td><input type="text" class="line-input-phieu" style="width: 50px;" value="10"></td>
                    <td><input type="text" class="line-input-phieu" style="width: 95px;" value="40.000.000"></td>
                </tr>
            </tbody>
        </table>

        <div class="total-wrapper-phieu">
            <div class="total-box-phieu">
                <span>TỔNG TIỀN:</span>
                <span>40.000.000 đ</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
